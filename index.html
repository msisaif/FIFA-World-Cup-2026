<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FIFA World Cup 2026 Bracket</title>
        <meta name="description" content="Interactive FIFA World Cup 2026 bracket simulator. Click flags to advance teams and predict your champion." />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://msisaif.github.io/FIFA-World-Cup-2026/" />
        <meta property="og:title" content="FIFA World Cup 2026 Bracket" />
        <meta property="og:description" content="Interactive bracket simulator for FIFA World Cup 2026. Pick winners round by round and crown your champion." />
        <meta property="og:image" content="https://msisaif.github.io/FIFA-World-Cup-2026/assets/og.png" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="FIFA World Cup 2026 Bracket" />
        <meta name="twitter:description" content="Interactive bracket simulator for FIFA World Cup 2026. Pick winners round by round and crown your champion." />
        <meta name="twitter:image" content="https://msisaif.github.io/FIFA-World-Cup-2026/assets/og.png" />

        <link rel="stylesheet" href="assets/css/style.css" />
    </head>
    <body>
        <header>
            <h1>
                FIFA World Cup
                <span class="glow">2026</span>
            </h1>
            <p class="sub">
                Click any flag to advance that team to the next round.
                Complete a full ring before moving inward.
                Work your way to the centre trophy to crown a champion.
            </p>
        </header>

        <div class="toolbar">
            <span class="hint" id="hint">Pick a team in each match</span>
            <button id="copyBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy image
            </button>
            <button id="dlBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download image
            </button>
            <button id="reset">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
                </svg>
                Reset
            </button>
        </div>

        <div class="stage" id="stage">
            <svg
                class="lines"
                id="lines"
                viewBox="0 0 1000 1000"
                preserveAspectRatio="xMidYMid meet"
            ></svg>
        </div>

        <div class="banner" id="banner">
            <div class="label">Champion</div>
            <div class="name" id="champName">—</div>
        </div>

        <div class="toast" id="toast"></div>

        <script src="assets/js/script.js"></script>
    </body>
</html>
