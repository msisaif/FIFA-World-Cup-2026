<!doctype html>
<html lang="bn">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FIFA World Cup 2026</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>
                FIFA World Cup
                <span class="glow">2026</span>
            </h1>
            <p class="sub">
                যেকোনো ফ্ল্যাগে ক্লিক করো — সেই দল ম্যাচ জিতে ভেতরের রাউন্ডে উঠবে।
                এক রাউন্ড সার্কেল শেষ হলে পরের রাউন্ড শুরু করা যাব। 
                এভাবে এগোতে এগোতে কেন্দ্রের ট্রফি পর্যন্ত পৌঁছাও। 
            </p>
        </header>

        <div class="toolbar">
            <span class="hint" id="hint">প্রতিটি ম্যাচে একটা দল বেছে নাও</span>
            <button id="copyBtn">ছবি কপি</button>
            <button id="dlBtn">ছবি ডাউনলোড</button>
            <button id="reset">আবার শুরু</button>
        </div>

        <div class="stage" id="stage">
            <svg
                class="lines"
                id="lines"
                viewBox="0 0 1000 1000"
                preserveAspectRatio="xMidYMid meet"
            ></svg>
        </div>

        <div class="banner" id="banner">
            <div class="label">Champion</div>
            <div class="name" id="champName">—</div>
        </div>

        <div class="toast" id="toast"></div>

        <script src="script.js"></script>
    </body>
</html>
